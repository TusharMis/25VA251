<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in js</title>
</head>
<body>
    <script>
        let studentList=["Tushar", "Rohit", "Nilesh", "John"];
        for(let i = 0; i<studentList.length[i]; i++){
            console.log(studentList[i]);
        }

        for(let x in studentList){
            console.log(studentList[x]);
        }

        for(let y of studentList){
            console.log(y);
        }

    </script>
</body>
</html>
